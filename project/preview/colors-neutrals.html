<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<p class="label">Neutral scale · ink</p>
<div class="row" style="gap:0;border-radius:6px;overflow:hidden;border:1px solid var(--border-hairline)">
  <div style="flex:1;height:80px;background:#FFFFFF;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#0A0A0A;font-family:var(--font-mono)">0 · #FFF</div>
  <div style="flex:1;height:80px;background:#FAFAFB;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#0A0A0A;font-family:var(--font-mono)">50</div>
  <div style="flex:1;height:80px;background:#F5F6F7;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#0A0A0A;font-family:var(--font-mono)">100</div>
  <div style="flex:1;height:80px;background:#E5E7E9;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#0A0A0A;font-family:var(--font-mono)">200</div>
  <div style="flex:1;height:80px;background:#CACDD1;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#0A0A0A;font-family:var(--font-mono)">300</div>
  <div style="flex:1;height:80px;background:#9CA1A7;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#FFF;font-family:var(--font-mono)">400</div>
  <div style="flex:1;height:80px;background:#6B7177;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#FFF;font-family:var(--font-mono)">500</div>
  <div style="flex:1;height:80px;background:#4A4F54;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#FFF;font-family:var(--font-mono)">600</div>
  <div style="flex:1;height:80px;background:#2E3236;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#FFF;font-family:var(--font-mono)">700</div>
  <div style="flex:1;height:80px;background:#18191B;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#FFF;font-family:var(--font-mono)">800</div>
  <div style="flex:1;height:80px;background:#0A0A0A;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#FFF;font-family:var(--font-mono)">900</div>
</div>
<p style="font-size:12px;color:var(--fg-2);margin:0;line-height:1.5">Eleven-step grayscale. UI surfaces stay in 0–200; text and inverse surfaces live in 600–900. Avoid 300–500 for text on light backgrounds.</p>
</div></body></html>
