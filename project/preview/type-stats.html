<!doctype html>
<html><head><meta charset="utf-8"><title>Stats Type</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<p class="label">Stats · tabular numerals</p>
<div style="display:flex;gap:32px;align-items:flex-end">
  <div>
    <div style="font-family:'Inter Tight',sans-serif;font-weight:800;font-size:56px;line-height:0.95;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:#0A0A0A">100<span style="color:#E2231A">+</span></div>
    <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#6B7177;margin-top:6px">Filling stations</div>
  </div>
  <div>
    <div style="font-family:'Inter Tight',sans-serif;font-weight:800;font-size:56px;line-height:0.95;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:#0A0A0A">1,500</div>
    <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#6B7177;margin-top:6px">Employees</div>
  </div>
  <div>
    <div style="font-family:'Inter Tight',sans-serif;font-weight:800;font-size:56px;line-height:0.95;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:#0A0A0A">2006</div>
    <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#6B7177;margin-top:6px">Founded</div>
  </div>
  <div>
    <div style="font-family:'Inter Tight',sans-serif;font-weight:800;font-size:56px;line-height:0.95;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:#0A0A0A">13</div>
    <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#6B7177;margin-top:6px">Countries</div>
  </div>
</div>
<p style="font-family:Inter,sans-serif;font-size:11px;color:#6B7177;margin:12px 0 0;line-height:1.5">Stat scale: 56px on cards, up to 96–128px on hero sections. Always tabular-nums; tracking -0.03em.</p>
</div></body></html>
