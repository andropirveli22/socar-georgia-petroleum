<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="_card.css">
<style>
.badge { font-family:Inter,sans-serif; font-size:11px; font-weight:600; letter-spacing:.04em; padding:4px 10px; border-radius:999px; display:inline-flex; align-items:center; gap:6px;}
.dot { width:6px; height:6px; border-radius:999px; }
</style>
</head>
<body><div class="card">
<p class="label">Status badges</p>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
  <span class="badge" style="background:#E0F5EA;color:#00723B"><span class="dot" style="background:#00A551"></span>Open · 24/7</span>
  <span class="badge" style="background:#FCE9E8;color:#951610"><span class="dot" style="background:#E2231A"></span>Out of stock</span>
  <span class="badge" style="background:#E0F4FB;color:#005C82"><span class="dot" style="background:#0099D8"></span>EV charger</span>
  <span class="badge" style="background:#FFF4DB;color:#7A5400"><span class="dot" style="background:#F2A900"></span>Scheduled maintenance</span>
  <span class="badge" style="background:#0A0A0A;color:#fff">Euro 5</span>
  <span class="badge" style="background:transparent;color:#0A0A0A;border:1px solid #CACDD1">Diesel</span>
</div>
<p class="label" style="margin-top:8px">Inline tags</p>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
  <span class="badge" style="background:#F5F6F7;color:#0A0A0A">Petrol</span>
  <span class="badge" style="background:#F5F6F7;color:#0A0A0A">Diesel</span>
  <span class="badge" style="background:#F5F6F7;color:#0A0A0A">LPG</span>
  <span class="badge" style="background:#F5F6F7;color:#0A0A0A">EV</span>
  <span class="badge" style="background:#F5F6F7;color:#0A0A0A">WayMart</span>
  <span class="badge" style="background:#F5F6F7;color:#0A0A0A">Car wash</span>
</div>
</div></body></html>
