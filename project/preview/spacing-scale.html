<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<p class="label">Spacing · 8-pt scale</p>
<div style="display:flex;flex-direction:column;gap:6px">
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:4px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-1</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">4px</div></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:8px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-2</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">8px</div></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:12px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-3</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">12px</div></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:16px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-4</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">16px</div></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:24px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-5</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">24px</div></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:32px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-6</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">32px</div></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:48px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-7</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">48px</div></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:64px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-8</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">64px</div></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:96px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-9</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">96px</div></div>
  <div style="display:flex;align-items:center;gap:12px"><div style="height:8px;background:#E2231A;width:128px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#0A0A0A;width:60px">--sp-10</div><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">128px</div></div>
</div>
</div></body></html>
