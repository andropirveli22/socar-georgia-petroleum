<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body><div class="card">
<p class="label">Iconography · Lucide 2px stroke</p>
<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:14px;text-align:center">
  <div><i data-lucide="fuel" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">fuel</div></div>
  <div><i data-lucide="flame" style="color:#E2231A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">flame</div></div>
  <div><i data-lucide="zap" style="color:#0099D8"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">zap</div></div>
  <div><i data-lucide="leaf" style="color:#00A551"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">leaf</div></div>
  <div><i data-lucide="map-pin" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">map-pin</div></div>
  <div><i data-lucide="truck" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">truck</div></div>
  <div><i data-lucide="car" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">car</div></div>
  <div><i data-lucide="shopping-bag" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">bag</div></div>
  <div><i data-lucide="gauge" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">gauge</div></div>
  <div><i data-lucide="building-2" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">building</div></div>
  <div><i data-lucide="credit-card" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">card</div></div>
  <div><i data-lucide="phone" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">phone</div></div>
  <div><i data-lucide="droplet" style="color:#0099D8"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">droplet</div></div>
  <div><i data-lucide="shield-check" style="color:#00A551"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">shield</div></div>
  <div><i data-lucide="arrow-right" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">arrow</div></div>
  <div><i data-lucide="chevron-right" style="color:#0A0A0A"></i><div style="font-size:10px;color:#6B7177;margin-top:4px;font-family:var(--font-mono)">chevron</div></div>
</div>
<script>lucide.createIcons();</script>
</div></body></html>
