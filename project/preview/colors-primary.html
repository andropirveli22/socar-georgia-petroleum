<!doctype html><html><head><meta charset="utf-8"><title>Brand colors</title><link rel="stylesheet" href="_card.css"><style>
.swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.sw { display: flex; flex-direction: column; gap: 8px; }
.sw .chip { height: 96px; border-radius: 8px; }
.sw .name { font-weight: 700; font-size: 14px; color: var(--fg-1); }
.sw .hex  { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
.sw .role { font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; }
</style></head><body><div class="card">
<div class="eyebrow">Primary brand colors</div>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:#E2231A"></div>
    <div class="name">SOCAR Red</div><div class="hex">#E2231A</div><div class="role">Energy / strength</div></div>
  <div class="sw"><div class="chip" style="background:#00A551"></div>
    <div class="name">SOCAR Green</div><div class="hex">#00A551</div><div class="role">Sustainability / gas</div></div>
  <div class="sw"><div class="chip" style="background:#0099D8"></div>
    <div class="name">SOCAR Blue</div><div class="hex">#0099D8</div><div class="role">Technology / nat. gas</div></div>
</div>
</div></body></html>
