<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#FAFAFB">
<p class="label">Elevation</p>
<div style="display:flex;gap:16px;padding:24px 0">
  <div style="flex:1;background:#fff;height:96px;border-radius:8px;border:1px solid var(--border-hairline);padding:14px;box-shadow:none"><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">shadow-0</div><div style="font-family:Inter;font-size:13px;font-weight:600;margin-top:6px">Resting card</div></div>
  <div style="flex:1;background:#fff;height:96px;border-radius:8px;border:1px solid var(--border-hairline);padding:14px;box-shadow:0 1px 2px rgba(10,10,10,.06)"><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">shadow-1</div><div style="font-family:Inter;font-size:13px;font-weight:600;margin-top:6px">Subtle</div></div>
  <div style="flex:1;background:#fff;height:96px;border-radius:8px;padding:14px;box-shadow:0 4px 12px rgba(10,10,10,.06), 0 1px 2px rgba(10,10,10,.04)"><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">shadow-2</div><div style="font-family:Inter;font-size:13px;font-weight:600;margin-top:6px">Hover</div></div>
  <div style="flex:1;background:#fff;height:96px;border-radius:8px;padding:14px;box-shadow:0 8px 24px rgba(10,10,10,.08), 0 2px 4px rgba(10,10,10,.04)"><div style="font-family:var(--font-mono);font-size:11px;color:#6B7177">shadow-3</div><div style="font-family:Inter;font-size:13px;font-weight:600;margin-top:6px">Floating</div></div>
</div>
</div></body></html>
