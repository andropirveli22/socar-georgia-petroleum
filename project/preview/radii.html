<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<p class="label">Corner radii</p>
<div style="display:flex;gap:16px;align-items:flex-end">
  <div style="text-align:center"><div style="width:80px;height:80px;background:#F5F6F7;border:1px solid var(--border-hairline);border-radius:0px;margin-bottom:6px"></div><code style="font-family:var(--font-mono);font-size:11px;color:#6B7177">0 · signage</code></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:#F5F6F7;border:1px solid var(--border-hairline);border-radius:2px;margin-bottom:6px"></div><code style="font-family:var(--font-mono);font-size:11px;color:#6B7177">2 · subtle</code></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:#F5F6F7;border:1px solid var(--border-hairline);border-radius:4px;margin-bottom:6px"></div><code style="font-family:var(--font-mono);font-size:11px;color:#6B7177">4 · button</code></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:#F5F6F7;border:1px solid var(--border-hairline);border-radius:8px;margin-bottom:6px"></div><code style="font-family:var(--font-mono);font-size:11px;color:#6B7177">8 · card</code></div>
  <div style="text-align:center"><div style="width:80px;height:80px;background:#F5F6F7;border:1px solid var(--border-hairline);border-radius:12px;margin-bottom:6px"></div><code style="font-family:var(--font-mono);font-size:11px;color:#6B7177">12 · hero</code></div>
  <div style="text-align:center"><div style="width:80px;height:32px;background:#F5F6F7;border:1px solid var(--border-hairline);border-radius:999px;margin-bottom:6px"></div><code style="font-family:var(--font-mono);font-size:11px;color:#6B7177">pill · badge</code></div>
</div>
</div></body></html>
