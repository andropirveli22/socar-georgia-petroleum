<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic Colors</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<p class="label">Semantic · status</p>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#E2231A"></div><div class="meta"><b>Danger / Error</b><code>--danger</code></div></div>
  <div class="swatch"><div class="chip" style="background:#00A551"></div><div class="meta"><b>Success</b><code>--success</code></div></div>
  <div class="swatch"><div class="chip" style="background:#0099D8"></div><div class="meta"><b>Info</b><code>--info</code></div></div>
  <div class="swatch"><div class="chip" style="background:#F2A900"></div><div class="meta"><b>Warning</b><code>--warning</code></div></div>
</div>
<p class="label" style="margin-top:8px">Tints (8% backgrounds)</p>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#FCE9E8"></div><div class="meta"><code>red-tint</code></div></div>
  <div class="swatch"><div class="chip" style="background:#E0F5EA"></div><div class="meta"><code>green-tint</code></div></div>
  <div class="swatch"><div class="chip" style="background:#E0F4FB"></div><div class="meta"><code>blue-tint</code></div></div>
  <div class="swatch"><div class="chip" style="background:#FFF4DB"></div><div class="meta"><code>warning-tint</code></div></div>
</div>
</div></body></html>
