<!doctype html>
<html><head><meta charset="utf-8"><title>Cards</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#FAFAFB">
<p class="label">Cards</p>
<div style="display:flex;gap:14px">
  <div style="flex:1;background:#fff;border:1px solid var(--border-hairline);border-radius:8px;padding:18px">
    <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#6B7177">Service</div>
    <div style="font-family:'Inter Tight',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.02em;color:#0A0A0A;margin-top:4px">Euro 5 Diesel</div>
    <div style="font-family:Inter,sans-serif;font-size:13px;color:#6B7177;line-height:1.5;margin-top:6px">Imported from Azerbaijan. Available with or without nano additive.</div>
  </div>
  <div style="flex:1;background:#fff;border-radius:8px;padding:18px;border-top:4px solid #E2231A;box-shadow:0 1px 2px rgba(10,10,10,.06)">
    <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#E2231A">Featured</div>
    <div style="font-family:'Inter Tight',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.02em;color:#0A0A0A;margin-top:4px">Fuel Card for Business</div>
    <div style="font-family:Inter,sans-serif;font-size:13px;color:#6B7177;line-height:1.5;margin-top:6px">Manage fleet fuel spend across 100+ stations.</div>
  </div>
  <div style="flex:1;background:#0A0A0A;color:#fff;border-radius:8px;padding:18px">
    <div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#9CA1A7">Inverse</div>
    <div style="font-family:'Inter Tight',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.02em;margin-top:4px">EV Charging</div>
    <div style="font-family:Inter,sans-serif;font-size:13px;color:#CACDD1;line-height:1.5;margin-top:6px">DC fast chargers across the highway network.</div>
  </div>
</div>
</div></body></html>
