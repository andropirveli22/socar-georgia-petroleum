<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SOCAR Station Surfaces</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--bg-1); color: var(--ink-900); padding: 64px 32px; }
  .stage { max-width: 1280px; margin: 0 auto; }
  .row { display: flex; gap: 48px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  h1 { font-family: var(--font-display); font-size: 40px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 8px; }
  .lede { font-family: var(--font-body); font-size: 16px; color: var(--ink-600); margin: 0 0 48px; max-width: 60ch; }
  .lab { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-500); margin-top: 16px; text-align: center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="stage">
  <h1>Station surfaces</h1>
  <p class="lede">Recreations of three core SOCAR Georgia Petroleum station surfaces — totem price board, pump-terminal screen, and canopy wayfinding.</p>
  <div id="root"></div>
</div>
<script type="text/babel" src="PriceBoard.jsx"></script>
<script type="text/babel" src="PumpScreen.jsx"></script>
<script type="text/babel" src="Wayfinding.jsx"></script>
<script type="text/babel">
  const { useEffect } = React;
  function App() {
    useEffect(() => { setTimeout(() => window.lucide && window.lucide.createIcons(), 50); });
    return (
      <div className="row">
        <div><PriceBoard/><div className="lab">Totem · price board</div></div>
        <div><PumpScreen/><div className="lab">Pump · live transaction</div></div>
        <div><Wayfinding/><div className="lab">Highway · wayfinding</div></div>
      </div>
    );
  }
  setTimeout(() => ReactDOM.createRoot(document.getElementById('root')).render(<App/>), 50);
</script>
</body>
</html>
