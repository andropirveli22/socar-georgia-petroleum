<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SOCAR Georgia Petroleum</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: #fff; color: var(--ink-900); }
  .svc-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(10,10,10,.08), 0 2px 4px rgba(10,10,10,.04); border-color: transparent !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="StatsBar.jsx"></script>
<script type="text/babel" src="ServicesGrid.jsx"></script>
<script type="text/babel" src="StationFinder.jsx"></script>
<script type="text/babel" src="NewsRow.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
  const { useEffect } = React;
  function App() {
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    return (
      <div>
        <Header active="Home" />
        <Hero />
        <StatsBar />
        <ServicesGrid />
        <StationFinder />
        <NewsRow />
        <Footer />
      </div>
    );
  }
  setTimeout(() => {
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 100);
  }, 50);
</script>
</body>
</html>
